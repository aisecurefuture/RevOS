# RevOS production stack (revos360.com).
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# vs dev: no source bind-mounts, restart=always, a one-shot migrate job, the
# Next.js frontend, a nightly Postgres backup, and Caddy for automatic HTTPS
# (Let's Encrypt certs are obtained AND auto-renewed by Caddy — no certbot).
name: revos

services:
  db:
    restart: always
    ports: []          # not exposed publicly in prod

  redis:
    restart: always
    ports: []

  # One-shot: apply Alembic migrations, then exit. Other services wait for it.
  migrate:
    build:
      context: ./backend
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  api:
    restart: always
    # !override drops the base file's ./backend:/app dev bind-mount (compose
    # merges volume lists by target, so simply listing volumes keeps it).
    volumes: !override
      - storage-data:/app/storage
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports: []          # reached via Caddy only

  worker:
    restart: always
    volumes: !override
      - storage-data:/app/storage
    depends_on:
      migrate:
        condition: service_completed_successfully
    # The image's HEALTHCHECK curls the API port — wrong for a Celery process.
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app.celery_app inspect ping --timeout 5 | grep -q pong"]
      interval: 60s
      timeout: 15s
      start_period: 30s
      retries: 3

  beat:
    restart: always
    volumes: !override []
    # Write the schedule DB somewhere the non-root user can always write.
    command: >
      celery -A app.workers.celery_app.celery_app beat --loglevel=info
      -s /tmp/celerybeat-schedule
    healthcheck:
      disable: true

  frontend:
    restart: always
    environment:
      BACKEND_INTERNAL_URL: http://api:8000
    ports: []          # reached via Caddy only
    depends_on:
      - api

  # Automatic HTTPS reverse proxy + static marketing site.
  caddy:
    image: caddy:2-alpine
    restart: always
    # Only ACME_EMAIL is passed in (not the whole .env) so app secrets never
    # reach the proxy container. Referenced as {$ACME_EMAIL} in the Caddyfile.
    environment:
      ACME_EMAIL: ${ACME_EMAIL:-hello@revos360.com}
    depends_on:
      - api
      - frontend
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./marketing:/srv/marketing:ro
      - caddy-data:/data       # persists certificates across restarts
      - caddy-config:/config

  # Local AI models (Ollama, OpenAI-compatible at http://ollama:11434/v1).
  # Used when .env sets AI_PROVIDER=local. Defaults sized for a 16 GB box —
  # on 32 GB (CCX33) raise OLLAMA_MEM_LIMIT to 26g+ and, if you want two
  # models resident for LOCAL_AI_MODEL_MAP routing, OLLAMA_MAX_LOADED=2.
  ollama:
    image: ollama/ollama:latest
    restart: always
    environment:
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED:-1}
      OLLAMA_KEEP_ALIVE: "10m"      # unload after idle to free RAM
      OLLAMA_NUM_PARALLEL: "1"
    mem_limit: ${OLLAMA_MEM_LIMIT:-10g}   # hard ceiling: Ollama dies before Postgres does
    volumes:
      - ollama-models:/root/.ollama

  # Nightly Postgres backup (gzipped pg_dump), 7-day retention.
  backup:
    image: postgres:16-alpine
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Backup service started; dumping nightly to /backups";
        while true; do
          TS=$$(date +%F_%H%M%S);
          if PGPASSWORD=$$POSTGRES_PASSWORD pg_dump -h db -U $$POSTGRES_USER $$POSTGRES_DB \
               | gzip > /backups/revos_$$TS.sql.gz; then
            echo "backup ok: revos_$$TS.sql.gz";
          else
            echo "backup FAILED at $$TS";
          fi;
          find /backups -name 'revos_*.sql.gz' -mtime +7 -delete;
          sleep 86400;
        done

volumes:
  storage-data:
  caddy-data:
  caddy-config:
  ollama-models:
