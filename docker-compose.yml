# RevOS development stack.
#   docker compose up --build
# Brings up: postgres, redis, FastAPI api, Celery worker, Celery beat.
# The Next.js frontend service is added in Module 4.
name: revos

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-revos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-revos}
      POSTGRES_DB: ${POSTGRES_DB:-revos}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-revos} -d ${POSTGRES_DB:-revos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    # Inside the compose network, reach services by name (db, redis).
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://revos:revos@db:5432/revos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      openbao:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - storage-data:/app/storage
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://revos:revos@db:5432/revos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      openbao:
        condition: service_started
    volumes:
      - ./backend:/app
      - storage-data:/app/storage
    command: >
      celery -A app.workers.celery_app.celery_app worker --loglevel=info

  beat:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://revos:revos@db:5432/revos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
      openbao:
        condition: service_started
    volumes:
      - ./backend:/app
    command: >
      celery -A app.workers.celery_app.celery_app beat --loglevel=info

  # Avatar video generation worker (P3-M3) — heavy ML image, CPU-only.
  # See deploy/avatar/README.md. Requires the Wav2Lip checkpoint bind-mounted
  # and AVATAR_WAV2LIP_CHECKPOINT pointed at it.
  avatar-worker:
    build:
      context: .
      dockerfile: deploy/avatar/Dockerfile.avatar
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://revos:revos@db:5432/revos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AVATAR_BACKEND: local
      AVATAR_WAV2LIP_CHECKPOINT: /ckpt/wav2lip.pt
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - storage-data:/app/storage
      - /opt/revos/wav2lip.pt:/ckpt/wav2lip.pt:ro

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    # Server-side proxy target for /api/* rewrites (browser stays same-origin).
    environment:
      BACKEND_INTERNAL_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

  openbao:
    image: openbao/openbao:2.2.0
    restart: unless-stopped
    command: ["server", "-config=/vault/config/config.hcl"]
    cap_add:
      - IPC_LOCK
    volumes:
      - ./openbao/config.hcl:/vault/config/config.hcl:ro
      - ./data/openbao:/vault/data
    # Bound to 127.0.0.1 on the host so the deploy script can reach it
    # but it is not accessible from the internet (no 0.0.0.0 binding).
    ports:
      - "127.0.0.1:8200:8200"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8200/v1/sys/health || true"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
  redis-data:
  storage-data:
